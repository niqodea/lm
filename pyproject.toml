[tool.mypy]
strict = true
warn_unreachable = true
disallow_any_unimported = true
disallow_any_decorated = true
disallow_any_explicit = true
extra_checks = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  # to avoid conflicts with formatter & other rules
  "COM812",
  "D203",
  "D212",
  # Too opinionated on TODOs
  "FIX002",
  "TD",
  # Too opinionated on complexity
  "C901",
  "PLR",
]
